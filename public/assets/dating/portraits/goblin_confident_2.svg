<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" role="img" aria-label="Goblin Confident 2, full-body SVG dating sim portrait">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#231f28"/>
      <stop offset="0.34" stop-color="#4c2f2a"/>
      <stop offset="0.7" stop-color="#171217"/>
      <stop offset="1" stop-color="#08070a"/>
    </linearGradient>
    <radialGradient id="smokeGlow" cx="50%" cy="22%" r="60%">
