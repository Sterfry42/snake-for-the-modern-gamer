# CI workflow — runs typecheck, lint, build, and test
name: Type Check

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run type check
        run: npm run typecheck
      - name: Run linter
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm run test
