# Type checking workflow — fails on any TypeScript errors or warnings
name: Type Check

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run type check
        run: |
          npm run typecheck > /tmp/typecheck.log 2>&1 || true
          cat /tmp/typecheck.log
          if grep -q "error TS" /tmp/typecheck.log; then
            echo "::error::TypeScript errors found! Please fix all type errors."
            exit 1
          fi
          if grep -q "warning TS" /tmp/typecheck.log; then
            echo "::error::TypeScript warnings found! Please fix all type warnings."
            exit 1
          fi
